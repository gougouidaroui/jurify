{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jurify{% endblock %} — Jurify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body class="bg-[var(--color-background)] text-[var(--color-foreground)] transition-colors duration-300" data-theme="light">
    <div class="bg-geo bg-geo--anchor" aria-hidden="true"></div>
    <div class="bg-geo bg-geo--ring" aria-hidden="true"></div>
    <div class="bg-geo bg-geo--counter" aria-hidden="true"></div>
    <div class="bg-geo bg-geo--pin-1" aria-hidden="true"></div>
    <div class="bg-geo bg-geo--pin-2" aria-hidden="true"></div>
    {% include 'navbar.html' %}

    {% if messages %}
    <div class="max-w-4xl mx-auto px-4 pt-4">
        {% for message in messages %}
        <div class="px-4 py-3 rounded-lg mb-2 {% if message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200{% elif message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200{% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function() {
            $('.select2-search').select2({
                width: '100%',
                placeholder: $(this).data('placeholder') || 'Rechercher...',
                language: {
                    noResults: function() { return 'Aucun résultat'; },
                    searching: function() { return 'Recherche...'; }
                }
            });
        });
    </script>
    <script>
        function updateIcons(theme) {
            const sunIcon = document.getElementById('theme-icon-sun');
            const moonIcon = document.getElementById('theme-icon-moon');
            if (theme === 'dark') {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcons(newTheme);
        }

        const initialTheme = document.documentElement.getAttribute('data-theme');
        updateIcons(initialTheme);
    </script>
</body>
</html>
