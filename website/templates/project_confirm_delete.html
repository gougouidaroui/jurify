{% extends 'base.html' %}
{% load static %}

{% block title %}Supprimer le projet{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto p-6 md:p-12">
    <div class="card-drip shadow-xl w-full max-w-lg text-center">
        <div class="card-drip-body">
        <h1 class="text-2xl font-extrabold mb-4 text-red-600">Supprimer le projet</h1>
        <p class="mb-2">Êtes-vous sûr de vouloir supprimer le projet :</p>
        <p class="text-xl font-bold mb-6">{{ projet.title }}</p>
        <p class="text-sm text-[var(--color-muted)] mb-6">Cette action est irréversible.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="flex gap-3 justify-center">
                <button type="submit"
                        class="bg-red-500 text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition-opacity btn-pop">
                    Confirmer la suppression
                </button>
                <a href="{% url 'project_detail' pk=projet.pk %}"
                   class="px-8 py-3 border border-[var(--color-border)] rounded-xl font-bold hover:bg-[var(--color-secondary)] transition-colors">
                    Annuler
                </a>
            </div>
        </form>
        </div>
    </div>
</div>
{% endblock %}
