{% extends 'base.html' %}

{% block title %}Email envoyé{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] p-4">
    <div class="rounded-box card-accent w-full max-w-sm text-center">
        <h2 class="text-2xl font-extrabold mb-4">Email envoyé !</h2>
        <p class="text-[var(--color-muted)] mb-6">
            Si un compte existe avec cette adresse e-mail, vous recevrez un lien de réinitialisation.
        </p>
        <a href="{% url 'login' %}"
           class="inline-block bg-[var(--color-primary)] text-[var(--color-on-primary)] px-6 py-3 rounded-xl font-bold hover:opacity-90 transition-opacity">
            Retour à la connexion
        </a>
    </div>
</div>
{% endblock %}
